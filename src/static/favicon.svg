<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Taxi body -->
  <rect x="4" y="28" width="56" height="20" rx="4" fill="#F5C518"/>
  <!-- Roof -->
  <path d="M16 28 L22 14 L42 14 L48 28" fill="#F5C518" stroke="#E0A800" stroke-width="1.5"/>
  <!-- Taxi sign on roof -->
  <rect x="25" y="8" width="14" height="8" rx="3" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="32" y="14.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#333">TAXI</text>
  <!-- Windows -->
  <path d="M18 28 L23 17 L31 17 L31 28Z" fill="#87CEEB" opacity="0.8"/>
  <path d="M33 28 L33 17 L41 17 L46 28Z" fill="#87CEEB" opacity="0.8"/>
  <!-- Headlights -->
  <rect x="4" y="34" width="5" height="4" rx="1" fill="#FFE066"/>
  <rect x="55" y="34" width="5" height="4" rx="1" fill="#FFE066"/>
  <!-- Bumper -->
  <rect x="6" y="48" width="52" height="3" rx="1.5" fill="#555"/>
  <!-- Wheels -->
  <circle cx="16" cy="50" r="6" fill="#333"/>
  <circle cx="16" cy="50" r="3" fill="#888"/>
  <circle cx="48" cy="50" r="6" fill="#333"/>
  <circle cx="48" cy="50" r="3" fill="#888"/>
  <!-- Door line -->
  <line x1="32" y1="28" x2="32" y2="46" stroke="#E0A800" stroke-width="1"/>
  <!-- Door handle -->
  <rect x="34" y="36" width="4" height="1.5" rx="0.75" fill="#555"/>
</svg>
