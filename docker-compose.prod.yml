# docker-compose.prod.yml - Production deployment
services:
  taxi-db:
    image: postgres:15-alpine
    container_name: taxi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taxi_api
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - taxi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  taxi-api:
    image: ghcr.io/ivantintore/taxi-api:latest
    container_name: taxi-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://taxi:${DB_PASSWORD}@taxi-db:5432/taxi_api
      ROOT_PATH: /tools3/taxi
    ports:
      - "127.0.0.1:8010:8000"
    networks:
      - default
      - dashboard_backend
    depends_on:
      taxi-db:
        condition: service_healthy
    volumes:
      - taxi_imports:/app/imports

networks:
  dashboard_backend:
    name: dashboard_backend
    external: true

volumes:
  taxi_pg_data:
    name: taxi-api_taxi_pg_data
    external: true
  taxi_imports:
    name: taxi-api_taxi_imports
    external: true
